run_id: R5XX
title: W2 v2 <control/telemetry> run at <interval> (<comparison_group>, <replicate_id>)
date: 2026-04-14

git:
  branch: testbed-dev
  commit: null
  tag: null

versions:
  firmware: "0.4.0"
  ha_config: "0.1.1"
  analysis: "0.4.0"

experiment:
  plan_id: W2
  workload: W2
  comparison_group: <none for idle validation|W2_0.5s|W2_1s|W2_2s|W2_3s|W2_4s|W2_5s|W2_6s|W2_7s|W2_8s|W2_9s|W2_10s>
  run_type: <idle_validation|control|telemetry>
  replicate_id: <primary|rep1|rep2>
  protocol: wifi
  topology: near
  interference: quiet
  load_level: single
  node_count: 1
  interval_ms: <0|500|1000|2000|3000|4000|5000|6000|7000|8000|9000|10000>
  trigger: <idle_connected|periodic_internal|periodic_telemetry>
  normalization_method: none

hardware:
  controller: "Raspberry Pi 4 running Home Assistant OS"
  logger_host: "external laptop (Ethernet; Wi-Fi disabled)"
  esp32_node: "wifi01_power"
  node_id: "wifi01_power"
  sensor: "INA231"
  shunt_resistor_ohm: 0.1
  bus_connection: "BUS pin connected to ESP32 VIN"

software:
  home_assistant: "2026.3.4"
  supervisor: "2026.03.2"
  os: "17.1"
  frontend: "20260312.1"
  mqtt_broker: "Mosquitto"
  mqtt_telemetry_enabled: <true|false>
  mqtt_power_reporting_enabled: false
  wifi_connected: true
  mqtt_connected: true
  ble_logger_enabled: false
  ack_helper_enabled: false

timing:
  timestamp_source: "ESP32 t_local_us (serial power + MQTT event)"
  power_sampling_interval_ms: 100
  experiment_duration_ms: 300000
  ntp_enabled: false
  timezone: "Asia/Hebron"

artifacts:
  raw:
    - raw/<RUN_ID>_serial.log
    - raw/<RUN_ID>_power_samples.csv
    - raw/<RUN_ID>_mqtt_events.csv
    - raw/<RUN_ID>_meta.json
  analysis:
    - analysis/summary.md
    - analysis/summary.json
    - analysis/metrics.json
  derived: []
  figures: []

result_summary:
  status: planned
  power_sample_count: null
  event_count: null
  key_observation: null
  anomalies: []

notes: >
  W2 v2 run using the revised matched-pair methodology. Power samples are
  logged over the serial interface only, while telemetry messages are sent
  over MQTT only when enabled. Power rows include the most recent telemetry
  sequence number and local timestamp to support event-aligned analysis.
  Final grouped interpretation is performed across comparison groups in
  analysis/w2/tables/groups.csv.
