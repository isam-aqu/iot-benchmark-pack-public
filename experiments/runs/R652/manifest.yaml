run_id: R652
title: W3 BLE automated baseline replicate rep3
date: 2026-05-01

git:
  branch: testbed-dev
  commit: c997f4b
  tag: null
  dirty: true

versions:
  firmware: "0.4.1"
  ha_config: "0.3.0"
  pipeline: "0.4.6"
  logger: "0.4.1"
  analysis: "0.4.4"
  experiment_protocol: "0.4.5"

experiment:
  plan_id: W3_B0
  workload: W3
  protocol: ble
  topology: near
  interference: quiet
  load_level: baseline
  node_count: 1
  interval_ms: "3000+/-250"
  comparison_group: W3_ble_auto
  run_type: baseline
  replicate_id: rep3
  baseline_ref: null
  trigger: esp32_auto_advertising
  normalization_method: median_offset

hardware:
  controller: "Raspberry Pi 4 running Home Assistant OS"
  logger_host: "external laptop (Ethernet; Wi-Fi disabled)"
  esp32_node: "ble01"
  node_id: "ble01"
  iperf_server: "iperf-server (<private-ip>)"

software:
  home_assistant: "2026.3.4"
  mqtt_broker: "Mosquitto"
  ble_logger_expected_exp_code: W3BL
  iperf_profile: null

timing:
  timestamp_source: "t_local_us + python_logger"
  expected_events: 100
  actual_events: 99
  interval_nominal_ms: 3000
  interval_jitter_ms: 250
  timezone: "Asia/Hebron"

commands:
  run: >
    EXP_RUN_ID=R652 ./run_all.sh --run-id W3_ble_auto_baseline --enable-ble --disable-ack --duration-sec 360 --serial-port /dev/serial-port --serial-baud 115200 --iperf-load 0 --reset-esp32
  analysis:
    - >
      python3 python/summarize_w3_run.py experiments/runs/R652/raw
      --run-id W3_ble_auto_baseline --expected-events 100
    - >
      python3 python/analyze_w3_run.py experiments/runs/R652/raw
      --run-id R652 --run-sheet docs/run_sheet.csv

artifacts:
  raw:
    - raw/W3_ble_auto_baseline_ble_events.csv
    - raw/W3_ble_auto_baseline_mqtt_events.csv
    - raw/W3_ble_auto_baseline_power_samples.csv
    - raw/W3_ble_auto_baseline_serial.log
    - raw/run_metadata.json
  analysis:
    - analysis/summary.json
    - analysis/metrics.json
  notes:
    - notes.md

result_summary:
  status: complete
  expected_events: 100
  actual_events: 99
  missing_events: 1
  missing_sequences:
    - 77
  duplicate_payload_rows: 0
  median_latency_ms: 0.000000
  mad_latency_ms: 86.986816
  p95_latency_ms: 172.881812
  p99_latency_ms: 274.790073
  max_latency_ms: 297.341797
  key_observation: "The BLE baseline replicate completed on the device side with 100 scheduled advertisements, while the BLE logger captured 99 unique events."
  anomalies:
    - "BLE sequence 77 was missed by the logger."
    - "MQTT and power CSVs are header-only, as expected for BLE latency capture."

notes: >
  W3 BLE baseline replicate rep3. The ESP32 emitted the
  complete 100-advertisement schedule with no scheduler overruns. The BLE logger
  captured 99 unique advertisements, and the missed-advertisement
  count is retained as part of the BLE reliability measurement.
