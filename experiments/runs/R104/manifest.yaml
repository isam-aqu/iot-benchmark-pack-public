artifacts:
  raw:
    - raw/W1_wifi_near_quiet_v4_mqtt_events.csv
    - raw/W1_wifi_near_quiet_v4_power_samples.csv
  derived:
    - derived/W1_wifi_near_quiet_v4_events_only.csv
