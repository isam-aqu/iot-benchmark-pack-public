result_summary:
  status: complete
  key_observation: "Reducing host-side application load did not improve Wi-Fi latency stability."
  anomalies:
    - "25 out of 100 RTT samples exceeded 200 ms."
    - "Full median and core P95 both worsened compared to R102."

dataset:
  total_samples: 100
  core_samples: 75
  outlier_handling: "RTT > 200 ms excluded from core dataset"
  filtering_range_ms: [0, 200]

notes: >
  Wi-Fi rerun with increased inter-event spacing maintained and many laptop
  background applications closed. Results indicate that ordinary host-side load
  is not the dominant source of the persistent latency spikes.
