  key_observation: "Stable 1 s periodic control trace with approximately 100 ms power sampling and recurring short power spikes aligned with the internal periodic schedule."
  anomalies:
    - "Minor quantization/register-timing effects may remain in some shunt/current combinations, but the run is stable and usable."

notes: >
  Control run for W2. Wi-Fi and MQTT remain connected, and the 1 s periodic
  internal schedule remains active, but MQTT reporting of power and event data
  is disabled. The run completed successfully using firmware-side fixed-duration
  control. Parsed output produced 3001 power samples and 301 event rows,
  consistent with the expected 1 s periodic workload over a 300 s run.
