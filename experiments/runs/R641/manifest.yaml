run_id: R641
title: W3 BLE automated light-load run
date: 2026-05-01

git:
  branch: testbed-dev
  commit: 76f662b
  tag: null
  dirty: true

versions:
  firmware: "0.4.1"
  ha_config: "0.3.0"
  pipeline: "0.4.6"
  logger: "0.4.1"
  analysis: "0.4.4"
  experiment_protocol: "0.4.5"

experiment:
  plan_id: W3_A
  workload: W3
  protocol: ble
  topology: near
  interference: iperf
  load_level: light
  node_count: 1
  interval_ms: "3000+/-250"
  comparison_group: W3_ble_auto
  run_type: load
  replicate_id: primary
  baseline_ref: R640
  trigger: esp32_auto_advertising
  normalization_method: median_offset

hardware:
  controller: "Raspberry Pi 4 running Home Assistant OS"
  logger_host: "external laptop (Ethernet; Wi-Fi disabled)"
  esp32_node: "ble01"
  node_id: "ble01"
  iperf_server: "iperf-server (<private-ip>)"

software:
  home_assistant: "2026.3.4"
  mqtt_broker: "Mosquitto"
  ble_logger_expected_exp_code: W3BL
  iperf_profile: 5Mbps_tcp

timing:
  timestamp_source: "t_local_us + python_logger"
  expected_events: 100
  actual_events: 98
  interval_nominal_ms: 3000
  interval_jitter_ms: 250
  timezone: "Asia/Hebron"

commands:
  run: >
    EXP_RUN_ID=R641 ./run_all.sh --run-id W3_ble_auto_light
    --enable-ble --disable-ack --duration-sec 360
    --serial-port /dev/serial-port --serial-baud 115200
    --iperf-load light --reset-esp32
  analysis:
    - >
      python3 python/summarize_w3_run.py experiments/runs/R641/raw
      --run-id W3_ble_auto_light --expected-events 100
    - >
      python3 python/analyze_w3_run.py experiments/runs/R641/raw
      --run-id R641 --run-sheet docs/run_sheet.csv

artifacts:
  raw:
    - raw/W3_ble_auto_light_ble_events.csv
    - raw/W3_ble_auto_light_mqtt_events.csv
    - raw/W3_ble_auto_light_power_samples.csv
    - raw/W3_ble_auto_light_serial.log
    - raw/W3_ble_auto_light_iperf.log
    - raw/W3_ble_auto_light_iperf_summary.json
    - raw/run_metadata.json
  analysis:
    - analysis/summary.json
    - analysis/metrics.json
  notes:
    - notes.md

result_summary:
  status: complete
  expected_events: 100
  actual_events: 98
  missing_events: 2
  missing_sequences:
    - 5
    - 37
  duplicate_payload_rows: 0
  median_latency_ms: 0.0
  mad_latency_ms: 83.840088
  p95_latency_ms: 147.991748
  p99_latency_ms: 274.666592
  max_latency_ms: 337.663574
  iperf_mean_mbps: 4.999024
  key_observation: "The BLE light-load run completed on the device side with 100 scheduled advertisements, while the BLE logger captured 98 unique events."
  anomalies:
    - "BLE sequences 5 and 37 were missed by the logger."
    - "MQTT and power CSVs are header-only, as expected for BLE latency capture."

notes: >
  Primary W3 BLE light-load run. The iperf client held the intended 5 Mbps
  profile, and BLE capture showed fewer missed advertisements than the R640
  quiet baseline. Interpret load deltas only after additional replicates.
