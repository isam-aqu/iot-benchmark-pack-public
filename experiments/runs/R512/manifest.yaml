run_id: R512
title: W2 v2 telemetry run at 5 s with serial power logging
date: 2026-04-14

git:
  branch: testbed-dev
  commit: null
  tag: null

versions:
  firmware: "0.3.0"
  ha_config: "0.1.1"
  analysis: "0.3.0"

experiment:
  plan_id: W2
  workload: W2
  protocol: wifi
  topology: near
  interference: quiet
  load_level: single
  node_count: 1
  interval_ms: 5000
  trigger: periodic_telemetry
  normalization_method: none

hardware:
  controller: "Raspberry Pi 4 running Home Assistant OS"
  logger_host: "external laptop"
  esp32_node: "wifi01_power"
  node_id: "wifi01_power"
  sensor: "INA231"
  shunt_resistor_ohm: 0.1
  bus_connection: "BUS pin connected to ESP32 VIN"

software:
  home_assistant: "2026.3.4"
  supervisor: "2026.03.2"
  os: "17.1"
  frontend: "20260312.1"
  mqtt_broker: "Mosquitto"
  mqtt_telemetry_enabled: true
  mqtt_power_reporting_enabled: false
  wifi_connected: true
  mqtt_connected: true
  ble_logger_enabled: false
  ack_helper_enabled: false

timing:
  timestamp_source: "ESP32 t_local_us (serial power + MQTT event)"
  power_sampling_interval_ms: 100
  experiment_duration_ms: 300000
  ntp_enabled: false
  timezone: "Asia/Hebron"

artifacts:
  raw:
    - raw/W2_wifi_periodic_5s_quiet_telemetry_v2_serial.log
    - raw/W2_wifi_periodic_5s_quiet_telemetry_v2_power_samples.csv
    - raw/W2_wifi_periodic_5s_quiet_telemetry_v2_mqtt_events.csv
    - raw/W2_wifi_periodic_5s_quiet_telemetry_v2_meta.json
    - raw/W2_wifi_periodic_5s_quiet_telemetry_v2_summary.json
    - raw/W2_wifi_periodic_5s_quiet_telemetry_v2_summary.md
  derived: []
  figures: []

result_summary:
  status: complete
  power_sample_count: 3001
  event_count: 60
  key_observation: >
    Stable 5 s telemetry execution with correct event timing and complete
    event-aligned power trace. The measured telemetry effect relative to control
    is smaller than the observed run-to-run system variability.
  anomalies: []

analysis:
  metrics:
    mean_power_mW: 366.96
    median_power_mW: 327.33
    std_power_mW: 116.19
