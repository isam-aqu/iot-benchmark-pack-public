    median_event_interval_ms: 5000.000
    max_event_interval_ms: 5000.067
  comparison_to_R509:
    delta_mean_power_mW: -1.23
    delta_relative_percent: -0.33
    delta_energy_mJ: -365.90
  role: telemetry
  interpretation: >
    R512 verifies correct operation of 5 s MQTT telemetry under the revised W2
    v2 methodology. However, the matched comparison with R509 indicates that the
    incremental telemetry effect at this rate is not distinguishable from the
    current system variability floor. The result is therefore treated as
    inconclusive with respect to net telemetry overhead magnitude.
  comparison_context:
    matched_control_run: R509
    relation_to_R511: "Suggests telemetry detectability decreases as interval increases"

notes: >
  W2 v2 telemetry run using the revised methodology. Power samples were logged
  over the serial interface only, while telemetry messages were sent over MQTT
  every 5 s. The final parsed dataset was complete and timing-consistent. The
  run is accepted as valid, but its comparison against R509 should be presented
  as near-noise-floor rather than as evidence of negative telemetry overhead.
