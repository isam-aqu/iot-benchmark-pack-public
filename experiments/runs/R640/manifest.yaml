run_id: R640
title: W3 BLE automated baseline with jittered interval
date: 2026-05-01

git:
  branch: testbed-dev
  commit: 76f662b
  tag: null
  dirty: true

versions:
  firmware: "0.4.1"
  ha_config: "0.3.0"
  pipeline: "0.4.6"
  logger: "0.4.1"
  analysis: "0.4.4"
  experiment_protocol: "0.4.5"

experiment:
  plan_id: W3_B0
  workload: W3
  protocol: ble
  topology: near
  interference: quiet
  load_level: baseline
  node_count: 1
  interval_ms: "3000±250"
  comparison_group: W3_ble_auto
  run_type: baseline
  replicate_id: primary
  baseline_ref: null
  trigger: esp32_auto_advertising
  normalization_method: median_offset

hardware:
  controller: "Raspberry Pi 4 running Home Assistant OS"
  logger_host: "external laptop (Ethernet; Wi-Fi disabled)"
  esp32_node: "ble01"
  node_id: "ble01"
  iperf_server: "iperf-server (<private-ip>)"

software:
  home_assistant: "2026.3.4"
  mqtt_broker: "Mosquitto"
  ble_logger_expected_exp_code: W3BL
  iperf_profile: null

timing:
  timestamp_source: "t_local_us + python_logger"
  expected_events: 100
  actual_events: 96
  interval_nominal_ms: 3000
  interval_jitter_ms: 250
  timezone: "Asia/Hebron"

commands:
  run: >
    EXP_RUN_ID=R640 ./run_all.sh --run-id W3_ble_auto_baseline
    --enable-ble --disable-ack --duration-sec 360
    --serial-port /dev/serial-port --serial-baud 115200
    --iperf-load 0 --reset-esp32
  analysis:
    - >
      python3 python/summarize_w3_run.py experiments/runs/R640/raw
      --run-id W3_ble_auto_baseline --expected-events 100
    - >
      python3 python/analyze_w3_run.py experiments/runs/R640/raw
      --run-id R640 --run-sheet docs/run_sheet.csv

artifacts:
  raw:
    - raw/W3_ble_auto_baseline_ble_events.csv
    - raw/W3_ble_auto_baseline_mqtt_events.csv
    - raw/W3_ble_auto_baseline_power_samples.csv
    - raw/W3_ble_auto_baseline_serial.log
    - raw/run_metadata.json
  analysis:
    - analysis/summary.json
    - analysis/metrics.json
  notes:
    - notes.md

result_summary:
  status: complete
  expected_events: 100
  actual_events: 96
  missing_events: 4
  missing_sequences:
    - 13
    - 20
    - 71
    - 98
  duplicate_payload_rows: 0
  median_latency_ms: 0.0
  mad_latency_ms: 94.782959
  p95_latency_ms: 215.004822
  p99_latency_ms: 314.187170
  max_latency_ms: 343.450928
  key_observation: "The BLE W3 baseline completed on the device side with 100 scheduled advertisements, while the BLE logger captured 96 unique events."
  anomalies:
    - "BLE sequences 13, 20, 71, and 98 were missed by the logger."
    - "MQTT and power CSVs are header-only, as expected for BLE latency capture."

notes: >
  Primary quiet baseline for the W3 BLE automated workload. This run is suitable
  as the comparison reference for later W3 BLE light, moderate, and heavy iperf
  runs, with the observed 4% missed-advertisement rate retained as a baseline
  reliability characteristic.
