result_summary:
  status: complete
  key_observation: "Removing the suspected ambient BLE advertiser did not improve BLE baseline behavior in this rerun."
  anomalies:
    - "Sequence 14 was not captured during the run."
    - "Sequence 31 was not captured during the run."
    - "Sequence 55 was not captured during the run."
    - "Captured 97 out of 100 triggered BLE events."
    - "Five captured samples exceeded the ±200 ms core range."
    - "Mean RSSI was weaker than in R303."

notes: >
  This run was performed after identifying a television with a BLE remote
  control as a possible ambient BLE confound in the room. The run repeated the
  corrected Ethernet-logger BLE baseline with that suspected ambient advertiser
  removed or made inactive. However, the rerun did not improve BLE behavior:
  compared with R303, it showed more missed events, more filtered outliers, and
  a worse core P95. This suggests that the previously observed BLE variability
  is not primarily explained by that specific ambient BLE source. Because R304
  also exhibited weaker mean RSSI than R303, the comparison does not completely
  isolate all physical-layer differences. R304 should therefore be treated as a
  confound-check rerun, while R303 remains the retained primary BLE baseline under the
  corrected measurement setup.
