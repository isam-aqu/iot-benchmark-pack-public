    median_interval_ms: 3000.0
    std_interval_ms: 0.03862485477394151
    jitter_ms: 0.03862485477394151
    max_interval_ms: 3000.099
    min_interval_ms: 2999.919

  reliability:
    expected_events: 100
    actual_events: 100
    missing_events: 0
    loss_rate: 0.0
