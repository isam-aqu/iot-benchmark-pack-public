exp_run_id: R521
run_id: W2_wifi_periodic_3s_quiet_telemetry_v2

study:
  workload: W2
  objective: >
    Matched telemetry run for 3 s Wi-Fi periodic workload under W2 v2.
    Quantifies device-level power and energy impact of telemetry publication.

classification:
  protocol: wifi
  mode: telemetry
  comparison_group: W2_3s
  replicate_id: primary
  is_baseline: false

environment:
  topology: near
  interference: quiet
  load_level: single
  node_count: 1

software:
  pipeline_version: 0.3.0
  firmware_version: 0.3.0
  ha_config_version: 0.3.0
  analysis_version: 0.3.0
  branch: testbed-dev
  commit: 3a23203
  tag: v0.3.0

execution:
  duration_sec: 330
  target_effective_window_sec: 300
  interval_ms: 3000
  serial_port: /dev/serial-port
  serial_baud: 115200
  ble_logger: disabled
  ack_helper: disabled
  timestamp_source: "ESP32 t_local_us + serial_power + MQTT_event"

logging:
  raw_dir: experiments/runs/R521/raw
  analysis_dir: experiments/runs/R521/analysis

artifacts:
  raw:
    - W2_wifi_periodic_3s_quiet_telemetry_v2_serial.log
    - W2_wifi_periodic_3s_quiet_telemetry_v2_power_samples.csv
    - W2_wifi_periodic_3s_quiet_telemetry_v2_mqtt_events.csv
    - W2_wifi_periodic_3s_quiet_telemetry_v2_meta.json
  analysis:
    - summary.json
    - summary.md
    - metrics.json

