run_id: R642
title: W3 BLE automated moderate-load run
date: 2026-05-01

git:
  branch: testbed-dev
  commit: 76f662b
  tag: null
  dirty: true

versions:
  firmware: "0.4.1"
  ha_config: "0.3.0"
  pipeline: "0.4.6"
  logger: "0.4.1"
  analysis: "0.4.4"
  experiment_protocol: "0.4.5"

experiment:
  plan_id: W3_A
  workload: W3
  protocol: ble
  topology: near
  interference: iperf
  load_level: moderate
  node_count: 1
  interval_ms: "3000+/-250"
  comparison_group: W3_ble_auto
  run_type: load
  replicate_id: primary
  baseline_ref: R640
  trigger: esp32_auto_advertising
  normalization_method: median_offset

hardware:
  controller: "Raspberry Pi 4 running Home Assistant OS"
  logger_host: "external laptop (Ethernet; Wi-Fi disabled)"
  esp32_node: "ble01"
  node_id: "ble01"
  iperf_server: "iperf-server (<private-ip>)"

software:
  home_assistant: "2026.3.4"
  mqtt_broker: "Mosquitto"
  ble_logger_expected_exp_code: W3BL
  iperf_profile: 20Mbps_tcp

timing:
  timestamp_source: "t_local_us + python_logger"
  expected_events: 100
  actual_events: 97
  interval_nominal_ms: 3000
  interval_jitter_ms: 250
  timezone: "Asia/Hebron"

commands:
  run: >
    EXP_RUN_ID=R642 ./run_all.sh --run-id W3_ble_auto_moderate
    --enable-ble --disable-ack --duration-sec 360
    --serial-port /dev/serial-port --serial-baud 115200
    --iperf-load moderate --reset-esp32
  analysis:
    - >
      python3 python/summarize_w3_run.py experiments/runs/R642/raw
      --run-id W3_ble_auto_moderate --expected-events 100
    - >
      python3 python/analyze_w3_run.py experiments/runs/R642/raw
      --run-id R642 --run-sheet docs/run_sheet.csv

artifacts:
  raw:
    - raw/W3_ble_auto_moderate_ble_events.csv
    - raw/W3_ble_auto_moderate_mqtt_events.csv
    - raw/W3_ble_auto_moderate_power_samples.csv
    - raw/W3_ble_auto_moderate_serial.log
    - raw/W3_ble_auto_moderate_iperf.log
    - raw/W3_ble_auto_moderate_iperf_summary.json
    - raw/run_metadata.json
  analysis:
    - analysis/summary.json
    - analysis/metrics.json
  notes:
    - notes.md

result_summary:
  status: complete
  expected_events: 100
  actual_events: 97
  missing_events: 3
  missing_sequences:
    - 12
    - 16
    - 85
  duplicate_payload_rows: 0
  median_latency_ms: 0.0
  mad_latency_ms: 64.670654
  p95_latency_ms: 108.551074
  p99_latency_ms: 236.904844
  max_latency_ms: 264.370117
  iperf_mean_mbps: 19.996477
  key_observation: "The BLE moderate-load run completed on the device side with 100 scheduled advertisements, while the BLE logger captured 97 unique events."
  anomalies:
    - "BLE sequences 12, 16, and 85 were missed by the logger."
    - "MQTT and power CSVs are header-only, as expected for BLE latency capture."

notes: >
  Primary W3 BLE moderate-load run. The iperf client held the intended 20 Mbps
  profile. BLE capture remained lossy but showed lower P95 than R640 in this
  single run; defer trend claims until replicates are collected.
