run_id: R625
title: W3 Zigbee light Wi-Fi interference replicate 1
date: 2026-04-30

git:
  branch: testbed-dev
  commit: f74f23b
  tag: null

versions:
  firmware: "0.4.0"
  ha_config: "0.3.0"
  pipeline: "0.4.4"
  logger: "0.4.1"
  analysis: "0.4.3"

experiment:
  plan_id: W3_A
  workload: W3
  protocol: zigbee
  topology: near
  interference: iperf
  load_level: light
  node_count: 1
  interval_ms: "3000+/-250"
  comparison_group: W3_zigbee_auto
  run_type: load
  replicate_id: rep1
  baseline_ref: R620
  trigger: home_assistant_rest_toggle
  normalization_method: median_offset

load:
  profile: "5Mbps_tcp"
  target_mbps: 5
  mean_interval_mbps: 5.001662
  std_interval_mbps: 0.442459
  interval_samples: 367

commands:
  run: >
    EXP_RUN_ID=R625 ./run_all.sh --run-id W3_zigbee_auto_light
    --disable-ble --disable-ack --duration-sec 360 --iperf-load light
    --zigbee-trigger --zigbee-entity-id light.benchmark_device --zigbee-events 100
    --zigbee-base-interval-ms 3000 --zigbee-jitter-ms 250
  analysis:
    - >
      python3 python/summarize_w3_run.py experiments/runs/R625/raw
      --run-id W3_zigbee_auto_light --expected-events 100
    - >
      python3 python/analyze_w3_run.py experiments/runs/R625/raw
      --run-id R625 --run-sheet docs/run_sheet.csv
  secrets_omitted:
    - HA_TOKEN
    - HOME_ASSISTANT_TOKEN

result_summary:
  status: complete
  expected_events: 100
  actual_events: 100
  missing_events: 0
  extra_events: 0
  duplicate_payload_rows: 0
  mad_latency_ms: 2.242048
  p95_latency_ms: 9.593242
  max_latency_ms: 10.350592
  command_delay_anomalies: 1

artifacts:
  raw:
    - raw/W3_zigbee_auto_light_mqtt_events.csv
    - raw/W3_zigbee_auto_light_zigbee_trigger_schedule.csv
    - raw/W3_zigbee_auto_light_iperf.log
    - raw/W3_zigbee_auto_light_iperf_summary.json
    - raw/run_metadata.json
  analysis:
    - analysis/summary.json
    - analysis/metrics.json
  notes:
    - notes.md
