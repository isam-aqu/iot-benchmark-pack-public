run_id: R636
title: "W3 Zigbee baseline rep4"
date: 2026-04-30

git:
  branch: testbed-dev
  commit: f74f23b
  tag: null

versions:
  firmware: "0.4.0"
  ha_config: "0.3.0"
  pipeline: "0.4.5"
  logger: "0.4.1"
  analysis: "0.4.3"

experiment:
  plan_id: W3_B0
  workload: W3
  protocol: zigbee
  topology: near
  interference: "quiet"
  load_level: "baseline"
  node_count: 1
  interval_ms: "3000+/-250"
  comparison_group: W3_zigbee_auto
  run_type: "baseline"
  replicate_id: "rep4"
  baseline_ref: null
  trigger: home_assistant_rest_toggle
  normalization_method: median_offset

commands:
  run: >
    EXP_RUN_ID=R636 ./run_all.sh --run-id W3_zigbee_auto_baseline --disable-ble --disable-ack --duration-sec 360 --iperf-load 0 --zigbee-trigger --zigbee-entity-id light.benchmark_device --zigbee-events 100 --zigbee-base-interval-ms 3000 --zigbee-jitter-ms 250
  analysis:
    - >
      python3 python/summarize_w3_run.py experiments/runs/R636/raw
      --run-id W3_zigbee_auto_baseline --expected-events 100
    - >
      python3 python/analyze_w3_run.py experiments/runs/R636/raw
      --run-id R636 --run-sheet docs/run_sheet.csv
  secrets_omitted:
    - HA_TOKEN
    - HOME_ASSISTANT_TOKEN

result_summary:
  status: complete
  expected_events: 100
  actual_events: 100
  missing_events: 0
  extra_events: 0
  repeated_event_id_rows: 0
  duplicate_payload_rows: 0
  mad_latency_ms: 2.124544
  p95_latency_ms: 11.067392
  max_latency_ms: 15.234944
  command_delay_anomalies: 1
  impact_label: "baseline"

artifacts:
  raw:
    - raw/W3_zigbee_auto_baseline_mqtt_events.csv
    - raw/W3_zigbee_auto_baseline_zigbee_trigger_schedule.csv
    - raw/run_metadata.json
  analysis:
    - analysis/summary.json
    - analysis/metrics.json
  notes:
    - notes.md
