run_id: R621
title: W3 Zigbee light Wi-Fi interference
date: 2026-04-30

git:
  branch: testbed-dev
  commit: f74f23b
  tag: null

versions:
  firmware: "0.4.0"
  ha_config: "0.3.0"
  pipeline: "0.4.3"
  logger: "0.4.1"
  analysis: "0.4.3"

experiment:
  plan_id: W3_A
  workload: W3
  protocol: zigbee
  topology: near
  interference: iperf
  load_level: light
  node_count: 1
  interval_ms: "3000+/-250"
  comparison_group: W3_zigbee_auto
  run_type: load
  replicate_id: primary
  baseline_ref: R620
  trigger: home_assistant_rest_toggle
  normalization_method: median_offset

hardware:
  controller: "Raspberry Pi 4 running Home Assistant OS"
  logger_host: "external laptop (Ethernet; Wi-Fi disabled)"
  zigbee_device: "light.benchmark_device"
  coordinator: "Sonoff Zigbee Coordinator"
  iperf_server: "iperf-server (<private-ip>)"

software:
  home_assistant: "2026.3.4"
  zigbee_stack: "ZHA"
  mqtt_broker: "Mosquitto"

timing:
  timestamp_source: "ha_time + python_logger"
  expected_events: 100
  interval_nominal_ms: 3000
  interval_jitter_ms: 250
  timezone: "Asia/Hebron"

load:
  tool: iperf3
  profile: "5Mbps_tcp"
  target_mbps: 5
  mean_interval_mbps: 5.001935
  std_interval_mbps: 0.440554
  interval_samples: 367

commands:
  run: >
    EXP_RUN_ID=R621 ./run_all.sh --run-id W3_zigbee_auto_light
    --disable-ble --disable-ack --duration-sec 360 --iperf-load light
    --zigbee-trigger --zigbee-entity-id light.benchmark_device --zigbee-events 100
    --zigbee-base-interval-ms 3000 --zigbee-jitter-ms 250
  analysis:
    - >
      python3 python/summarize_w3_run.py experiments/runs/R621/raw
      --run-id W3_zigbee_auto_light --expected-events 100
    - >
      python3 python/analyze_w3_run.py experiments/runs/R621/raw
      --run-id R621 --run-sheet docs/run_sheet.csv
  secrets_omitted:
    - HA_TOKEN
    - HOME_ASSISTANT_TOKEN

artifacts:
  raw:
    - raw/W3_zigbee_auto_light_mqtt_events.csv
    - raw/W3_zigbee_auto_light_power_samples.csv
    - raw/W3_zigbee_auto_light_zigbee_trigger_schedule.csv
    - raw/W3_zigbee_auto_light_zigbee_trigger_schedule.csv.meta.json
    - raw/W3_zigbee_auto_light_iperf.log
    - raw/W3_zigbee_auto_light_iperf_summary.json
    - raw/run_metadata.json
  analysis:
    - analysis/summary.json
    - analysis/metrics.json
  notes:
    - notes.md

result_summary:
  status: complete
  expected_events: 100
  actual_events: 100
  missing_events: 0
  duplicate_payload_rows: 0
  median_latency_ms: 0.0
  mad_latency_ms: 2.709504
  p95_latency_ms: 11.523725
  max_latency_ms: 12.042496
  reliability_rate: 1.0
  impact_label: negligible
  key_observation: "Light Wi-Fi iperf load did not materially affect W3 Zigbee HA-to-logger latency or reliability relative to R620."
  anomalies: []

notes: >
  Formal W3 Zigbee light-load run using Home Assistant REST toggles and a
  5 Mbps TCP iperf background load. The run captured all 100 expected Zigbee
  state-change events with unique Home Assistant event IDs and no duplicate
  payload rows. Command-to-HA state-change timing stayed below 175 ms, so the
  actuation delay observed once in R620 did not recur in this run.
