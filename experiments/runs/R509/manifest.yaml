notes: >
  W2 v2 control run using the revised methodology. Power samples were logged
  over the serial interface only, while telemetry MQTT remained disabled.
  Event rows were still emitted by the internal periodic scheduler and parsed
  for alignment analysis. This rerun is preferred over the earlier R509 result
  because it supports better interpretation of the 5 s matched comparison.
