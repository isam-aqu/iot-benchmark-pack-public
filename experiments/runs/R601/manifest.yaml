run_id: R601
title: W3 Wi-Fi auto latency under light iperf load
date: 2026-04-24

git:
  branch: testbed-dev
  commit: "db9c9e5"
  tag: "v0.4.0"

versions:
  firmware: "0.4.0"
  ha_config: "0.3.0"
  analysis: "0.4.0"
  pipeline: "0.4.0"

experiment:
  plan_id: W3_A
  workload: W3
  comparison_group: W3_wifi_auto
  run_type: load
  replicate_id: primary
  baseline_ref: R600
  protocol: wifi
  topology: near
  interference: iperf
  load_level: light
  node_count: 1
  interval_nominal_ms: 3000
  interval_jitter_ms: 250
  trigger: auto
  timestamp_source: ESP32_RTT
  normalization_method: none

hardware:
  controller: "Raspberry Pi 4 running Home Assistant OS"
  logger_host: "external laptop (Ethernet; Wi-Fi disabled)"
  iperf_server: "iperf-server (<private-ip>)"
  esp32_node: "wifi01"
  node_id: "wifi01"
  sensor: null

software:
  home_assistant: "2026.3.4"
  mqtt_broker: "Mosquitto"
  iperf_profile: "5Mbps_tcp"
  iperf_target_mbps: 5
  iperf_mean_interval_mbps: 4.999
  wifi_connected: true
  mqtt_connected: true
  ble_logger_enabled: false

timing:
  timestamp_source: "ESP32 RTT using rtt_us"
  expected_events: 100
  actual_events: 100
  mean_interval_ms: 3000.141
  jitter_ms: 144.334
  timezone: "Asia/Hebron"

artifacts:
  raw:
    - raw/W3_wifi_auto_light_serial.log
    - raw/W3_wifi_auto_light_iperf.log
    - raw/W3_wifi_auto_light_iperf_summary.json
    - raw/W3_wifi_auto_light_power_samples.csv
    - raw/W3_wifi_auto_light_mqtt_events.csv
  analysis:
    - analysis/summary.json
    - analysis/metrics.json
  derived: []
  figures: []

result_summary:
  status: complete
  baseline_run: R600
  power_sample_count: 0
  event_count: 100
  latency_sample_count: 100
  mean_latency_ms: 30.008
  median_latency_ms: 14.001
  p95_latency_ms: 23.096
  max_latency_ms: 1478.984
  drop_rate: 0.0
  reliability_rate: 1.0
  delta_mean_latency_ms: 1.007
  delta_p95_latency_ms: 3.061
  pct_mean_latency_increase: 3.473
  pct_p95_latency_increase: 15.281
  impact_label: negligible
  key_observation: "Light iperf load preserved full event reliability and produced only a small mean-latency increase relative to R600."
  anomalies:
    - "One extreme RTT sample reached 1478.984 ms."
    - "Power sample CSV is header-only; W3 latency analysis uses MQTT RTT rows."

notes: >
  Primary light-load W3 Wi-Fi run. Compared with R600, mean latency increased
  by about 1.01 ms and P95 increased by about 3.06 ms while reliability remained
  at 100%.
